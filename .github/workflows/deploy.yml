

name: Backend CI Pipeline

on:
  push:
    branches: [master,tejas]
  pull_request:
    branches: [master,tejas]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Build Docker Image
        run: docker build -t tejas1625/swiftmart_backend:test .